# configs/baseline.yaml
# Full fine-tuning config — all RoBERTa-base parameters are trained.

run_name:       "baseline_full_ft"
wandb_project:  "lora-replication"

# Model
model_name:     "roberta-base"
mode:           "full"           # "full" | "lora"

# Task
task:           "sst2"
num_labels:     2
max_length:     128

# Training
epochs:         10
batch_size:     32
learning_rate:  2.0e-5
weight_decay:   0.01
warmup_ratio:   0.06             # linear warmup then linear decay (paper Appendix C.2)
gradient_accumulation_steps: 1
seed: 0
target_accuracy: 0.90
